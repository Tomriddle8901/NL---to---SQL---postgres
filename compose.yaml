      - "5417:5432"

  pg18:
    image: postgres:18
    container_name: pg18_test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: practice
    ports:
      - "5418:5432"